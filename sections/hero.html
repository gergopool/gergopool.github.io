<!-- Header Section -->
<header class="hero">

    <div class="location-badge">

        </div>
        <div class="tech-icon" data-name="Huggingface">
            <img src="images/huggingface.png" alt="Huggingface">
        </div>
        <div class="tech-icon" data-name="LangChain">
            <img src="images/langchain.png" alt="LangChain">
        </div>
        <div class="tech-icon" data-name="Azure">
            <img src="images/azure.png" alt="Azure">

        <div class="tech-icon" data-name="AWS Bedrock">
            <img src="images/bedrock.png" alt="AWS Bedrock">
        </div>
